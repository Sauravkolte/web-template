<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Creative Showcase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="editor-panel">
        <div class="header">
            <h1><i class="fas fa-palette"></i> Edit Template: Creative Portfolio</h1>
            <div class="nav">
                <a href="/templete.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Templates</a>
                <div class="buttons">
                    <button class="btn btn-outline"><i class="fas fa-copy"></i> Copy Code</button>
                    <button class="btn btn-primary" id="fullscreen-preview"><i class="fas fa-eye"></i> Preview</button>
                </div>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tabs-list">
                <div class="tab active" data-tab="content">Content</div>
                <div class="tab" data-tab="portfolio">Portfolio</div>
            </div>
            
            <div class="tab-content active" id="content-tab">
                <div class="form-group">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-control" id="your-name" value="Alexandra Carter">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Profession</label>
                    <input type="text" class="form-control" id="profession" value="UI/UX Designer & Photographer">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Profile Image</label>
                    <input type="file" class="form-control" id="profile-image" accept="image/*">
                    <div id="image-preview" class="image-preview"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">About Me</label>
                    <textarea class="form-control" id="about-me" rows="6">I'm a creative professional with 8+ years of experience in digital design and photography. My work focuses on creating beautiful, functional interfaces and capturing moments that tell stories.</textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Social Links (comma separated)</label>
                    <input type="text" class="form-control" id="social-links" value="instagram.com/alexdesign, twitter.com/alexdesign, dribbble.com/alexdesign">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Contact Email</label>
                    <input type="text" class="form-control" id="contact-email" value="hello@alexandracarter.com">
                </div>
            </div>
            
            <div class="tab-content" id="portfolio-tab">
                <div class="portfolio-items" id="portfolio-container">
                    <!-- Portfolio items will be added here dynamically -->
                </div>
                
                <button class="btn btn-outline" id="add-portfolio" style="margin-top: 1rem;">
                    <i class="fas fa-plus"></i> Add Portfolio Item
                </button>
            </div>
        </div>
    </div>
    
    <div class="preview-panel">
        <div class="preview-container">
            <div class="preview-header">
                <h3 class="preview-title"><i class="fas fa-eye"></i> Portfolio Preview</h3>
                <div class="preview-actions">
                    <button class="btn btn-outline" id="refresh-preview">
              
                    </button>
                    <button class="btn btn-outline" id="fullscreen-preview">
        
                    </button>
                </div>
            </div>
            
            <div class="preview-content" id="live-preview">
                <!-- Preview content will be rendered here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
